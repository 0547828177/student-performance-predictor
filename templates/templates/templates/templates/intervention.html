{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4>📝 Record Intervention for {{ student.name }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label>Action Taken</label>
                        <input type="text" name="action" class="form-control" required placeholder="e.g., Meeting with advisor, Call to parent">
                    </div>
                    <div class="mb-3">
                        <label>Notes (optional)</label>
                        <textarea name="notes" class="form-control" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Intervention</button>
                    <a href="/list" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
